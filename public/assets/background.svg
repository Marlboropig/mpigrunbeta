  <!-- Neon Dust -->
  <rect x="0" y="0" width="800" height="600" fill="url(#neon-gradient)" opacity="0.1" />
  <defs>
    <radialGradient id="neon-gradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#9945FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D0B21;stop-opacity:1" />
    </radialGradient>
