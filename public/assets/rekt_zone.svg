<svg width="60" height="400" viewBox="0 0 60 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="lava-glow" x="-50%" y="-10%" width="200%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="rock-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Rock Body -->
  <rect x="5" y="0" width="50" height="400" rx="2" fill="url(#rock-grad)" stroke="#333" stroke-width="1" />
  
  <!-- Lava Cracks -->
  <path d="M10 50 L30 70 L15 120 M45 200 L25 240 L50 300 M5 350 L25 370" stroke="#FF4D00" stroke-width="2" filter="url(#lava-glow)" />
  <path d="M10 50 L30 70 L15 120 M45 200 L25 240 L50 300 M5 350 L25 370" stroke="#FF9900" stroke-width="1" opacity="0.8" />
  
  <!-- Hazard Stripes -->
  <rect x="5" y="0" width="50" height="15" fill="#FFD700" opacity="0.2" />
  <path d="M5 0 L15 0 L5 10 M20 0 L30 0 L10 15 M35 0 L45 0 L25 15" stroke="#000" stroke-width="2" opacity="0.3" />
  
  <!-- REKT ZONE Text (Simulated) -->
  <rect x="10" y="180" width="40" height="40" fill="rgba(255,0,0,0.1)" rx="2" stroke="red" stroke-width="0.5" stroke-dasharray="2 2" />
</svg>
