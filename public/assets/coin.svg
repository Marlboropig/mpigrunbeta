  <!-- Outer Rim -->
  <circle cx="20" cy="20" r="18" fill="url(#gold-grad)" stroke="#DAA520" stroke-width="2" filter="url(#gold-glow)" />
  <!-- Solana Logo in Center -->
  <path d="M10 15 L30 15 L25 18 L5 18 Z" fill="#DAA520" />
